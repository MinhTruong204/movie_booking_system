# General configuration for all environments
spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

logging:
  file:
    name: logs/viecinema.log
  level:
    root: INFO
    com.viecinema: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,mappings

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false

security:
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:6yJp4vC1S3f7mQ9hF2uX8LgR0kWzB5Pd7aTnV4YqH0cJr9KxNw}
    refresh-token-secret: ${JWT_REFRESH_SECRET:DKdy/eACbmk2vTPGfnIPmYGWiDrMVRT2BGhUgIddRrA=}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:1h}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:7d}

app:
  base-url: http://localhost:8080  # Dev
  frontend-url: http://localhost:3000  # Frontend URL for redirects

vnpay:
  # Information from VNPay Sandbox
  tmn-code: HLBPLRMV
  hash-secret: PM6GQJ9RQ8FYXHTC55O1NR1TW0MR361A
  api-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${app.base-url}/api/payments/vnpay/callback  # URL to receive results
  ipn-url: ${app.base-url}/api/payments/vnpay/ipn  # URL to receive IPN (Instant Payment Notification)

  # Timeout settings
  timeout: 15  # 15 minutes

  # Version settings
  version: 2.1.0
  command: pay
  currency-code: VND
  locale: vn  # vn or en